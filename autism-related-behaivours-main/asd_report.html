
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Early Screen ASD - Report</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
            body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; margin: 0; padding: 40px; }
            .container { max-width: 800px; margin: 0 auto; background: #1E293B; padding: 40px; border-radius: 12px; border: 1px solid #334155; }

            .logo { font-size: 24px; font-weight: 700; color: #E11D48; }

            .verdict-value { font-size: 32px; font-weight: 700; color: #10B981; }
            .trait-row { display: flex; align-items: center; margin-bottom: 12px; }
            .trait-label { width: 150px; font-weight: 600; }
            .bar-container { flex-grow: 1; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin: 0 15px; }
            .bar-fill { height: 100%; border-radius: 6px; }
            .trait-pct { width: 60px; text-align: right; font-weight: 700; color: #E11D48; }
        </style>
    </head>
    <body>

                <div style="margin-top: 10px; font-size: 18px;">Normal Activity (85.0%)</div>
            </div>
            <section>
                <h2>MSB Trait Analysis</h2>
                
        <div class="trait-row">

            <div class="bar-container">
                <div class="bar-fill" style="width: 0.0%; background: #E11D48;"></div>
            </div>
            <div class="trait-pct" style="color: #E11D48;">0.0%</div>

        <div class="trait-row">

            <div class="trait-pct" style="color: #10B981;">100.0%</div>

            </section>

    </html>
